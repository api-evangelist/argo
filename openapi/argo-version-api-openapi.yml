openapi: 3.1.0
info:
  title: Argo CD Applications Version API
  description: The Argo CD API provides REST endpoints for managing GitOps continuous delivery on Kubernetes. It enables creating and managing applications, projects, repositories, clusters, and certificates. The API supports syncing application state to match the desired state declared in Git, querying health and sync status, managing access control, and configuring notifications. All operations require authentication via bearer token obtained from the session endpoint.
  version: v2.x
  contact:
    name: Argo CD Community
    url: https://argo-cd.readthedocs.io/en/stable/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
- url: https://localhost/api/v1
  description: Argo CD Server (default in-cluster address)
security:
- bearerAuth: []
tags:
- name: Version
  description: Server version information endpoint.
paths:
  /version:
    get:
      operationId: getVersion
      summary: Argo CD Argo Get Server Version
      description: Returns the Argo CD server version, build date, Git commit SHA, Go version, and Kubernetes server version.
      tags:
      - Version
      security: []
      responses:
        '200':
          description: Version information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionMessage'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    VersionMessage:
      type: object
      description: Argo CD server version information.
      properties:
        Version:
          type: string
          description: Argo CD version string.
        BuildDate:
          type: string
          description: Build date.
        GitCommit:
          type: string
          description: Git commit SHA of this build.
        GoVersion:
          type: string
          description: Go language version used to build.
        Platform:
          type: string
          description: Operating system and architecture.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token obtained from the POST /session endpoint using username/password or from an external OIDC provider configured in Argo CD.
externalDocs:
  description: Argo CD API Documentation
  url: https://argo-cd.readthedocs.io/en/stable/developer-guide/api-docs/
