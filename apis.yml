aid: argo
name: Argo
description: Argo is a collection of open-source Kubernetes-native tools for workflows, events, CI/CD, and progressive delivery.
  The project includes Argo Workflows (container-native workflow engine), Argo CD (declarative GitOps continuous delivery),
  Argo Events (event-driven automation framework), and Argo Rollouts (progressive delivery with canary and blue-green strategies).
  Argo is a CNCF graduated project governed by the Linux Foundation.
