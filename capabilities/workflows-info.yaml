    Naftiko capability covering one Argo business surface.'
  tags:
  - Argo
  - Info
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ARGO_API_KEY: ARGO_API_KEY
capability:
  consumes:
  - type: http
    namespace: workflows-info
    baseUri: https://{host}:{port}/api/v1
    description: Argo Workflows API — Info business capability. Self-contained, no shared references.
    resources:
    - name: info
      path: /info
      operations:
      - name: getinfo
        method: GET
        description: Argo Workflows Argo Get Server Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: version
      path: /version
      operations:
      - name: getversion
        method: GET
        description: Argo Workflows Argo Get Server Version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ARGO_API_KEY}}'
  exposes:
  - type: rest
    namespace: workflows-info-rest
    port: 8080
    description: REST adapter for Argo Workflows API — Info. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/info
      name: info
      description: REST surface for info.
      operations:
      - method: GET
        name: getinfo
        description: Argo Workflows Argo Get Server Info
        call: workflows-info.getinfo
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/version
      name: version
      description: REST surface for version.
      operations:
      - method: GET
        name: getversion
        description: Argo Workflows Argo Get Server Version
        call: workflows-info.getversion
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: workflows-info-mcp
    port: 9090
    transport: http
    description: MCP adapter for Argo Workflows API — Info. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: argo-workflows-argo-get-server
      description: Argo Workflows Argo Get Server Info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: workflows-info.getinfo
      outputParameters:
      - type: object
        mapping: $.
    - name: argo-workflows-argo-get-server-2
      description: Argo Workflows Argo Get Server Version
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: workflows-info.getversion
      outputParameters:
      - type: object
        mapping: $.
