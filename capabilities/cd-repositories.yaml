naftiko: 1.0.0-alpha2
info:
  label: Argo CD API — Repositories
  description: 'Argo CD API — Repositories. 3 operations. Lead operation: Argo CD Argo List Repositories. Self-contained Naftiko
    capability covering one Argo business surface.'
  tags:
  - Argo
  - Repositories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ARGO_API_KEY: ARGO_API_KEY
capability:
  consumes:
  - type: http
    namespace: cd-repositories
    baseUri: https://localhost/api/v1
    description: Argo CD API — Repositories business capability. Self-contained, no shared references.
    resources:
    - name: repositories
      path: /repositories
      operations:
      - name: listrepositories
        method: GET
        description: Argo CD Argo List Repositories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createrepository
        method: POST
        description: Argo CD Argo Register a Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: repositories-repo
      path: /repositories/{repo}
      operations:
      - name: deleterepository
        method: DELETE
        description: Argo CD Argo Delete a Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repo
          in: path
          type: string
          description: Repository URL (URL-encoded).
          required: true
    authentication:
      type: bearer
      token: '{{env.ARGO_API_KEY}}'
  exposes:
  - type: rest
    namespace: cd-repositories-rest
    port: 8080
    description: REST adapter for Argo CD API — Repositories. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/repositories
      name: repositories
      description: REST surface for repositories.
      operations:
      - method: GET
        name: listrepositories
        description: Argo CD Argo List Repositories
        call: cd-repositories.listrepositories
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createrepository
        description: Argo CD Argo Register a Repository
        call: cd-repositories.createrepository
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{repo}
      name: repositories-repo
      description: REST surface for repositories-repo.
      operations:
      - method: DELETE
        name: deleterepository
        description: Argo CD Argo Delete a Repository
        call: cd-repositories.deleterepository
        with:
          repo: rest.repo
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cd-repositories-mcp
    port: 9090
    transport: http
    description: MCP adapter for Argo CD API — Repositories. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: argo-cd-argo-list-repositories
      description: Argo CD Argo List Repositories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cd-repositories.listrepositories
      outputParameters:
      - type: object
        mapping: $.
    - name: argo-cd-argo-register-repository
      description: Argo CD Argo Register a Repository
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cd-repositories.createrepository
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: argo-cd-argo-delete-repository
      description: Argo CD Argo Delete a Repository
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: cd-repositories.deleterepository
      with:
        repo: tools.repo
      outputParameters:
      - type: object
        mapping: $.
