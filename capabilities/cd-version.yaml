naftiko: 1.0.0-alpha2
info:
  label: Argo CD API — Version
  description: 'Argo CD API — Version. 1 operations. Lead operation: Argo CD Argo Get Server Version. Self-contained Naftiko
    capability covering one Argo business surface.'
  tags:
  - Argo
  - Version
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ARGO_API_KEY: ARGO_API_KEY
capability:
  consumes:
  - type: http
    namespace: cd-version
    baseUri: https://localhost/api/v1
    description: Argo CD API — Version business capability. Self-contained, no shared references.
    resources:
    - name: version
      path: /version
      operations:
      - name: getversion
        method: GET
        description: Argo CD Argo Get Server Version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ARGO_API_KEY}}'
  exposes:
  - type: rest
    namespace: cd-version-rest
    port: 8080
    description: REST adapter for Argo CD API — Version. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/version
      name: version
      description: REST surface for version.
      operations:
      - method: GET
        name: getversion
        description: Argo CD Argo Get Server Version
        call: cd-version.getversion
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cd-version-mcp
    port: 9090
    transport: http
    description: MCP adapter for Argo CD API — Version. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: argo-cd-argo-get-server
      description: Argo CD Argo Get Server Version
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cd-version.getversion
      outputParameters:
      - type: object
        mapping: $.
